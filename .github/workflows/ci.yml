name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Check landscape data integrity
        run: npm run check:landscape

      - name: Export landscape snapshot
        run: npm run export:landscape

      - name: Build
        run: npm run build

      - name: Upload landscape snapshot
        uses: actions/upload-artifact@v4
        with:
          name: landscape-snapshot
          path: public/data/
